name: PanicGuard
options:
  bundleIdPrefix: com.panicguard
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: "5.7.0"
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift.git
    from: "0.15.0"
  MediaPipeTasksGenAI:
    url: https://github.com/google/ai-edge-bazel-ios
    from: "0.4.0"

targets:
  PanicGuard:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Views
      - path: Models
      - path: Services
      - path: Detection
        excludes:
          - "PanicGuardRF.mlpackage"
      - path: Detection/PanicGuardRF.mlpackage
      - path: Gemma
      - path: Intervention
      - path: Escalation
      - path: Onboarding
      - path: Settings
      - path: Demo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panicguard.app
        INFOPLIST_FILE: App/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    dependencies:
      - package: SnapKit
      - package: SQLite
      - package: MediaPipeTasksGenAI
    entitlements:
      path: App/PanicGuard.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.healthkit.background-delivery: true
    preBuildScripts: []
    postBuildScripts: []
